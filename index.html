<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3B82F6">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>HARUKI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;padding-bottom:80px;padding-top:env(safe-area-inset-top)}
.header{background:#3B82F6;color:#fff;padding:12px 16px;font-size:18px;font-weight:800;text-align:center;position:sticky;top:0;z-index:100}
.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid #e0e0e0;padding-bottom:env(safe-area-inset-bottom);z-index:100}
.tab{flex:1;text-align:center;padding:8px 2px 4px;font-size:10px;color:#999;cursor:pointer;transition:.2s}
.tab.active{color:#3B82F6}
.tab-icon{font-size:20px;display:block;margin-bottom:2px}
.page{display:none;padding:12px}
.page.active{display:block}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.summary-card{background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;transition:.2s}
.summary-card:active{transform:scale(.96)}
.summary-card .icon{font-size:24px;margin-bottom:6px}
.summary-card .value{font-size:20px;font-weight:800}
.summary-card .label{font-size:12px;color:#888;margin-top:4px}
.search-box{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:12px;background:#fff}
.list-item{background:#fff;padding:14px;border-radius:10px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.06);cursor:pointer;transition:.2s}
.list-item:active{background:#f0f0f0}
.list-item .name{font-size:15px;font-weight:600}
.list-item .sub{font-size:12px;color:#888;margin-top:3px}
.list-item .right{text-align:right}
.list-item .stock{font-size:18px;font-weight:700}
.stock-low{color:#ef4444}
.stock-ok{color:#22c55e}
.row{display:flex;justify-content:space-between;align-items:center}
.btn{padding:12px 20px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:.2s}
.btn:active{opacity:.8}
.btn-blue{background:#3B82F6;color:#fff}
.btn-green{background:#22c55e;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-gray{background:#e5e5e5;color:#333}
.input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:8px}
.mic-btn{position:fixed;bottom:90px;right:16px;width:56px;height:56px;border-radius:50%;background:#3B82F6;color:#fff;border:none;font-size:24px;box-shadow:0 4px 12px rgba(0,0,0,.2);cursor:pointer;z-index:99;transition:.2s}
.mic-btn.listening{background:#ef4444;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.mic-feedback{position:fixed;bottom:155px;right:16px;background:rgba(0,0,0,.75);color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;z-index:99;max-width:250px;display:none}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;color:#fff}
.badge-green{background:#22c55e}
.badge-blue{background:#3B82F6}
.badge-red{background:#ef4444}
.total-bar{position:fixed;bottom:60px;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:12px 16px;z-index:98;display:none}
.total-bar .amount{font-size:18px;font-weight:800;color:#ef4444}
.date-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:10px;padding:10px 16px;margin-bottom:12px}
.date-nav button{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 12px}
.date-nav .date-text{font-size:16px;font-weight:600;cursor:pointer}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
.detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0}
.detail-label{color:#888;font-size:14px}
.detail-value{font-size:14px;font-weight:500}
.loading{text-align:center;padding:40px;color:#888}
.empty{text-align:center;padding:60px 20px;color:#999}
.empty .icon{font-size:48px;margin-bottom:12px}
.phone-link{color:#22c55e;text-decoration:none;font-weight:500}
</style>
</head>
<body>

<div class="header" id="headerTitle">HARUKI</div>

<!-- 대시보드 -->
<div class="page active" id="page-dashboard">
  <div id="dashLoading" class="loading">데이터 로딩 중...</div>
  <div id="dashContent" style="display:none">
    <div class="card-grid" id="summaryGrid"></div>
  </div>
</div>

<!-- 상품 -->
<div class="page" id="page-products">
  <input class="search-box" id="productSearch" placeholder="상품명, 바코드, 거래처 검색" oninput="filterProducts()">
  <div id="productList"></div>
</div>

<!-- 거래처 -->
<div class="page" id="page-vendors">
  <div style="display:flex;gap:6px;margin-bottom:10px">
    <input class="search-box" id="vendorSearch" placeholder="거래처명, 건물 검색" oninput="filterVendors()" style="flex:1;margin:0">
    <button class="btn btn-blue" onclick="showAddVendor()" style="width:50px;padding:8px;font-size:20px">+</button>
  </div>
  <div id="vendorList"></div>
</div>

<!-- 고객 -->
<div class="page" id="page-customers">
  <div style="display:flex;gap:6px;margin-bottom:10px">
    <button class="btn store-filter active" onclick="setStoreFilter('전체')" style="flex:1;padding:8px;font-size:13px;background:#3B82F6;color:#fff">전체</button>
    <button class="btn store-filter" onclick="setStoreFilter('남성복')" style="flex:1;padding:8px;font-size:13px;background:#e5e5e5;color:#333">👔 남성복</button>
    <button class="btn store-filter" onclick="setStoreFilter('여성복')" style="flex:1;padding:8px;font-size:13px;background:#e5e5e5;color:#333">👗 여성복</button>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:10px">
    <input class="search-box" id="customerSearch" placeholder="고객명, 연락처 검색" oninput="filterCustomers()" style="flex:1;margin:0">
    <button class="btn btn-blue" onclick="showAddCustomer()" style="width:50px;padding:8px;font-size:20px">+</button>
  </div>
  <div id="customerList"></div>
</div>

<!-- 사입용 -->
<div class="page" id="page-purchase">
  <div class="date-nav">
    <button onclick="changePurchaseDate(-1)">◀</button>
    <span class="date-text" id="purchaseDateText" onclick="document.getElementById('purchaseDateInput').showPicker()">오늘</span>
    <input type="date" id="purchaseDateInput" style="position:absolute;opacity:0;width:0" onchange="setPurchaseDate(this.value)">
    <button onclick="changePurchaseDate(1)">▶</button>
  </div>
  <div id="purchaseList"></div>
  <div style="margin-top:12px">
    <button class="btn btn-blue" onclick="openReceiptCamera()">📸 영수증 촬영</button>
  </div>
  <input type="file" id="receiptInput" accept="image/*" capture="environment" style="display:none" onchange="processReceiptPhoto(this)">
</div>

<!-- 사입 합계 바 -->
<div class="total-bar" id="purchaseTotalBar">
  <div class="row">
    <span style="font-size:14px;font-weight:500">오늘의 사입금액:</span>
    <span class="amount" id="purchaseTotalAmount">0원</span>
  </div>
</div>

<!-- 탭 바 -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard')"><span class="tab-icon">📊</span>대시보드</div>
  <div class="tab" onclick="switchTab('products')"><span class="tab-icon">📦</span>상품</div>
  <div class="tab" onclick="switchTab('vendors')"><span class="tab-icon">🏢</span>거래처</div>
  <div class="tab" onclick="switchTab('customers')"><span class="tab-icon">👥</span>고객</div>
  <div class="tab" onclick="switchTab('purchase')"><span class="tab-icon">🛒</span>사입용</div>
</div>

<!-- 마이크 버튼 -->
<button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>
<div class="mic-feedback" id="micFeedback"></div>

<!-- 상세 모달 -->
<div class="modal" id="detailModal">
  <div class="modal-content" id="detailContent"></div>
</div>

<!-- 설정 모달 -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <div class="modal-title">설정</div>
    <label style="font-size:13px;color:#888">Gemini API 키 (최대 5개, 자동 로테이션)</label>
    <input class="input apiKeySlot" type="password" placeholder="API 키 1">
    <input class="input apiKeySlot" type="password" placeholder="API 키 2">
    <input class="input apiKeySlot" type="password" placeholder="API 키 3">
    <input class="input apiKeySlot" type="password" placeholder="API 키 4">
    <input class="input apiKeySlot" type="password" placeholder="API 키 5">
    <label style="font-size:13px;color:#888">프린터 서버 주소</label>
    <input class="input" id="serverUrlInput" placeholder="예: 192.168.0.10:5000">
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-blue" onclick="saveSettings()" style="flex:1">저장</button>
      <button class="btn btn-gray" onclick="closeModal('settingsModal')" style="flex:1">닫기</button>
    </div>
  </div>
</div>

<!-- 상품 자동등록 모달 -->
<div class="modal" id="autoRegModal">
  <div class="modal-content" style="max-height:90vh;overflow-y:auto">
    <div class="modal-title">📸 영수증 사진으로 상품 자동등록</div>
    <label style="font-size:13px;color:#888">영수증 사진 선택 (여러장 가능)</label>
    <input type="file" id="receiptFiles" accept="image/*" multiple style="width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px;margin-bottom:8px">
    <div id="receiptPreview" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-blue" onclick="analyzeReceipts()" id="btnAnalyze" style="flex:1">🔍 AI 분석 시작</button>
      <button class="btn btn-gray" onclick="closeModal('autoRegModal')" style="flex:1">닫기</button>
    </div>
    <div id="autoRegStatus" style="text-align:center;padding:8px;color:#888;font-size:13px;margin-top:8px"></div>
    <div id="autoRegResults"></div>
  </div>
</div>

<!-- AI 분석 오버레이 -->
<div id="analyzeOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:32px;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">🔍</div>
    <div style="font-weight:600">AI가 영수증을 분석 중...</div>
    <div style="font-size:13px;color:#888;margin-top:8px">잠시만 기다려주세요</div>
  </div>
</div>

<script>
// ===== 설정 =====
const BASE_URL = 'https://script.google.com/macros/s/AKfycbyH9vRLZARpqzzgkd6DGmwAObFcDu-6PrZqE6pcjFwk2sTXpaGvcT12OlNzHqpXbBDrXw/exec';

let products = [], vendors = [], customers = [], summary = null;
let purchaseDate = new Date();
let skipConfirmation = localStorage.getItem('skipConfirm') === 'true';

// ===== 초기화 =====
window.onload = () => {
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  loadAll();
  updatePurchaseDateDisplay();
  renderPurchaseList();
};

// ===== 탭 전환 =====
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.tab')[['dashboard','products','vendors','customers','purchase'].indexOf(name)].classList.add('active');

  const titles = {dashboard:'HARUKI',products:'상품',vendors:'거래처',customers:'고객',purchase:'사입용'};
  document.getElementById('headerTitle').innerHTML = titles[name] +
    (name === 'dashboard' ? ' <span style="font-size:13px;cursor:pointer" onclick="openModal(\'settingsModal\');loadSettings()">⚙️</span>' : '');

  document.getElementById('purchaseTotalBar').style.display = name === 'purchase' ? 'block' : 'none';
}

// ===== API 호출 =====
async function apiFetch(params) {
  const url = BASE_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url, {redirect:'follow'});
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(BASE_URL, {method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body),redirect:'follow'});
  return res.json();
}

async function loadAll() {
  try {
    const [sRes, pRes, vRes, cRes] = await Promise.all([
      apiFetch({action:'summary'}),
      apiFetch({action:'list',type:'products'}),
      apiFetch({action:'list',type:'vendors'}),
      apiFetch({action:'list',type:'customers'})
    ]);
    summary = sRes;
    products = pRes.rows || [];
    vendors = vRes.rows || [];
    customers = cRes.rows || [];
    renderDashboard();
    renderProducts();
    renderVendors();
    renderCustomers();
    document.getElementById('dashLoading').style.display = 'none';
    document.getElementById('dashContent').style.display = 'block';
  } catch(e) {
    document.getElementById('dashLoading').textContent = '데이터 로딩 실패. 새로고침해주세요.';
  }
}

// ===== 대시보드 =====
function renderDashboard() {
  if (!summary) return;
  const s = summary;
  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card" onclick="switchTab('products')">
      <div class="icon">📦</div><div class="value">${s.totalProducts}</div><div class="label">총 상품</div>
    </div>
    <div class="summary-card">
      <div class="icon">📋</div><div class="value">${s.totalStock}개</div><div class="label">총 재고</div>
    </div>
    <div class="summary-card" onclick="switchTab('vendors')">
      <div class="icon">🏢</div><div class="value">${s.totalVendors}</div><div class="label">거래처</div>
    </div>
    <div class="summary-card" onclick="switchTab('customers')">
      <div class="icon">👥</div><div class="value">${s.totalCustomers}</div><div class="label">고객</div>
    </div>
    <div class="summary-card" onclick="openPrinter()">
      <div class="icon">🖨️</div><div class="label">프린터 출력</div>
    </div>
    <div class="summary-card" onclick="openAutoRegister()">
      <div class="icon">📸</div><div class="label">상품 자동등록</div>
    </div>
  `;
}

// ===== 상품 =====
function renderProducts(list) {
  const arr = list || products;
  document.getElementById('productList').innerHTML = arr.length === 0 ? '<div class="empty"><div class="icon">📦</div>상품이 없습니다</div>' :
    arr.map(p => {
      const stock = parseInt(p.STOCK)||0;
      const low = stock <= 3;
      return `<div class="list-item" onclick="showProductDetail('${p.BARCODE}')">
        <div class="row"><div><div class="name">${p.NAME}</div><div class="sub">${p.VENDOR} · ${p.BARCODE}</div></div>
        <div class="right"><div class="stock ${low?'stock-low':'stock-ok'}">${p.STOCK}개</div><div class="sub">${p.SELL}원</div></div></div>
      </div>`;
    }).join('');
}

function filterProducts() {
  const q = document.getElementById('productSearch').value.toLowerCase();
  if (!q) return renderProducts();
  renderProducts(products.filter(p => p.NAME.toLowerCase().includes(q) || p.BARCODE.toLowerCase().includes(q) || p.VENDOR.toLowerCase().includes(q)));
}

function showProductDetail(barcode) {
  const p = products.find(x => x.BARCODE === barcode);
  if (!p) return;
  let specs = [];
  try { specs = typeof p.SPECS === 'string' ? JSON.parse(p.SPECS) : (p.SPECS || []); } catch(e) {}
  if (!Array.isArray(specs)) specs = [];
  const specsHtml = specs.length > 0 ? specs.map((s,i) => `
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;padding:8px;background:#f9f9f9;border-radius:8px">
      <span style="font-size:13px;color:#888;min-width:24px">${i+1}</span>
      <input class="input specColor" value="${s.color||''}" placeholder="색상" style="flex:2;margin:0">
      <input class="input specSize" value="${s.size||''}" placeholder="사이즈" style="flex:1;margin:0">
      <input class="input specQty" type="number" value="${s.qty||0}" placeholder="수량" style="flex:1;margin:0">
    </div>`).join('') : '<div style="padding:12px;color:#999;text-align:center;font-size:13px">규격 정보 없음</div>';
  document.getElementById('detailContent').innerHTML = `
    <div class="modal-title">상품 상세</div>
    <label style="font-size:13px;color:#888">상품명</label>
    <input class="input" id="editProductName" value="${p.NAME}">
    <label style="font-size:13px;color:#888">거래처</label>
    <input class="input" id="editProductVendor" value="${p.VENDOR}">
    <label style="font-size:13px;color:#888">바코드</label>
    <input class="input" value="${p.BARCODE}" disabled style="background:#f0f0f0">
    <label style="font-size:13px;color:#888">매입가</label>
    <input class="input" id="editProductBuy" type="text" value="${p.BUY}">
    <label style="font-size:13px;color:#888">판매가</label>
    <input class="input" id="editProductSell" type="text" value="${p.SELL}">
    <label style="font-size:13px;color:#888">총 재고</label>
    <input class="input" id="newStockInput" type="number" value="${p.STOCK}">
    <label style="font-size:13px;color:#888;margin-top:8px">색상/사이즈별 규격</label>
    <div id="specsContainer">${specsHtml}</div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-blue" onclick="updateProduct('${p.BARCODE}')" style="flex:1">저장</button>
      <button class="btn btn-gray" onclick="closeModal('detailModal')" style="flex:1">닫기</button>
    </div>
  `;
  openModal('detailModal');
}

async function updateProduct(barcode) {
  const specs = [];
  const container = document.getElementById('specsContainer');
  const rows = container.querySelectorAll('div[style*="display:flex"]');
  let totalQty = 0;
  rows.forEach(row => {
    const color = row.querySelector('.specColor')?.value || '';
    const size = row.querySelector('.specSize')?.value || '';
    const qty = row.querySelector('.specQty')?.value || '0';
    specs.push({barcode:'', size, color, note:'', qty});
    totalQty += parseInt(qty) || 0;
  });
  const data = {
    NAME: document.getElementById('editProductName').value,
    VENDOR: document.getElementById('editProductVendor').value,
    BUY: document.getElementById('editProductBuy').value,
    SELL: document.getElementById('editProductSell').value,
    STOCK: specs.length > 0 ? String(totalQty) : document.getElementById('newStockInput').value,
    SPECS: specs.length > 0 ? JSON.stringify(specs) : ''
  };
  try {
    await apiPost({action:'updateProduct', barcode, data});
    alert('저장되었습니다');
    closeModal('detailModal');
    loadAll();
  } catch(e) { alert('저장 실패'); }
}

async function updateStock(barcode) {
  const newStock = parseInt(document.getElementById('newStockInput').value);
  if (isNaN(newStock)) return;
  try {
    await apiPost({action:'updateStock',barcode,newStock});
    alert('재고가 변경되었습니다');
    closeModal('detailModal');
    loadAll();
  } catch(e) { alert('변경 실패'); }
}

// ===== 거래처 =====
function renderVendors(list) {
  const arr = list || vendors;
  document.getElementById('vendorList').innerHTML = arr.length === 0 ? '<div class="empty"><div class="icon">🏢</div>거래처가 없습니다</div>' :
    arr.map(v => `<div class="list-item" onclick="showVendorDetail('${v.NAME}')">
      <div class="name">${v.NAME}</div>
      <div class="sub">${[v.BUILDING,v.FLOOR?v.FLOOR+'층':'',v.ROOM?v.ROOM+'호':''].filter(x=>x).join(' ')}</div>
      ${v.MOBILE ? '<div class="sub">📱 '+v.MOBILE+'</div>' : ''}
    </div>`).join('');
}

function filterVendors() {
  const q = document.getElementById('vendorSearch').value.toLowerCase();
  if (!q) return renderVendors();
  renderVendors(vendors.filter(v => v.NAME.toLowerCase().includes(q) || (v.BUILDING||'').toLowerCase().includes(q)));
}

function showVendorDetail(name) {
  const v = vendors.find(x => x.NAME === name);
  if (!v) return;
  document.getElementById('detailContent').innerHTML = `

async function analyzeReceipts() {
  const files = document.getElementById('receiptFiles').files;
  if (!files.length) { alert('사진을 선택해주세요'); return; }

  const btn = document.getElementById('btnAnalyze');
  const status = document.getElementById('autoRegStatus');
  const results = document.getElementById('autoRegResults');
  btn.disabled = true;
  results.innerHTML = '';

  const allProducts = [];
  const allSuppliers = [];

  for (let i = 0; i < files.length; i++) {
    status.textContent = `AI 분석 중... (${i+1}/${files.length})`;
    btn.textContent = `분석 중 ${i+1}/${files.length}`;

    try {
      const base64 = await fileToBase64(files[i]);
      const data = await analyzeOneReceipt(base64, files[i].type || 'image/jpeg');
      if (data && data.products && data.products.length > 0) {
        if (data.supplier) allSuppliers.push(data.supplier);
        data.products.forEach(p => {
          p._supplier = data.supplier?.name || '';
          allProducts.push(p);
        });
        status.textContent = `${i+1}번 사진: ${data.products.length}개 상품 발견`;
      } else if (data && data._error) {
        status.textContent = `${i+1}번 사진 오류: ${data._error}`;
        results.innerHTML += `<div style="color:red;font-size:12px;padding:4px">${i+1}번: ${data._error}</div>`;
      } else {
        status.textContent = `${i+1}번 사진: 상품을 찾지 못함`;
      }
    } catch(e) {
      status.textContent = `${i+1}번 사진 분석 실패: ${e.message}`;
      results.innerHTML += `<div style="color:red;font-size:12px;padding:4px">${i+1}번 에러: ${e.message}</div>`;
    }
  }

  if (allProducts.length === 0) {
    status.textContent = '분석된 상품이 없습니다.';
    btn.disabled = false;
    btn.textContent = '🔍 AI 분석 시작';
    return;
  }

  status.textContent = `총 ${allProducts.length}개 상품 분석 완료. 확인 후 등록하세요.`;
  btn.textContent = '🔍 AI 분석 시작';
  btn.disabled = false;

  // 결과 표시
  let html = '';
  // 사입처 정보 표시
  const uniqueSuppliers = [];
  allSuppliers.forEach(s => {
    if (s.name && !uniqueSuppliers.find(u => u.name === s.name)) uniqueSuppliers.push(s);
  });
  if (uniqueSuppliers.length) {
    html += '<div style="margin-top:12px;padding:10px;background:#f0f6ff;border-radius:8px;font-size:13px"><b>사입처:</b> ';
    html += uniqueSuppliers.map(s => `${s.name} ${s.building||''} ${s.floor||''} ${s.room||''}`).join(', ');
    html += '</div>';
  }

  html += '<div style="margin-top:12px">';
  allProducts.forEach((p, i) => {
    html += `<div style="padding:8px;border:1px solid #eee;border-radius:8px;margin-bottom:6px">
      <div style="display:flex;gap:4px;align-items:center;margin-bottom:4px">
        <input type="checkbox" id="regChk${i}" checked style="width:18px;height:18px">
        <b style="font-size:14px">${p.name}</b>
        <span style="font-size:12px;color:#888">${p._supplier}</span>
      </div>
      <div style="display:flex;gap:6px">
        <input class="input regName" value="${p.name}" placeholder="상품명" style="flex:3;margin:0;font-size:13px;padding:6px">
        <input class="input regColor" value="${p.color||''}" placeholder="색상" style="flex:1;margin:0;font-size:13px;padding:6px">
        <input class="input regSize" value="${p.size||'F'}" placeholder="사이즈" style="flex:1;margin:0;font-size:13px;padding:6px">
        <input class="input regPrice" value="${p.price||''}" placeholder="단가" style="flex:1;margin:0;font-size:13px;padding:6px">
        <input class="input regQty" value="${p.quantity||1}" placeholder="수량" type="number" style="flex:1;margin:0;font-size:13px;padding:6px">
      </div>
      <input class="input regSupplier" value="${p._supplier}" placeholder="사입처" style="margin:4px 0 0;font-size:13px;padding:6px">
    </div>`;
  });
  html += '</div>';
  html += `<button class="btn btn-blue" onclick="registerAllProducts(${allProducts.length})" style="margin-top:12px">✅ 선택 상품 일괄 등록 (${allProducts.length}개)</button>`;

  results.innerHTML = html;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function analyzeOneReceipt(base64, mimeType) {
  const apiKey = getGeminiKey();
  const prompt = `이 영수증 이미지를 분석해서 아래 JSON 형식으로만 응답하세요. 다른 설명 없이 JSON만 출력하세요.

{
  "supplier": {
    "name": "사입처명 (한글만)",
    "phone": "02로 시작하는 전화번호 (없으면 빈문자열)",
    "mobile": "010으로 시작하는 번호 (없으면 빈문자열)",
    "building": "건물명 (없으면 빈문자열)",
    "floor": "층수 (없으면 빈문자열)",
    "room": "호수 (없으면 빈문자열)"
  },
  "products": [
    {
      "name": "품명만 (색상/사이즈 제외)",
      "color": "색상 (없으면 빈문자열)",
      "size": "사이즈 (FREE는 F로, 없으면 F)",
      "price": 단가숫자,
      "quantity": 수량숫자
    }
  ]
}

규칙:
1. products는 판매소계 위 항목만 포함
2. 반품소계 아래 항목 제외
3. 수량 음수(-) 항목 제외
4. price와 quantity는 숫자만
5. 사입처명은 한글명만
6. 품명의 슬래시(/) 뒤 색상/사이즈는 분리
7. FREE는 F로 변환`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{parts: [
          {inline_data: {mime_type: mimeType, data: base64}},
          {text: prompt}
        ]}],
        generationConfig: {maxOutputTokens: 4096}
      })
    });

    if (!res.ok) {
      const errText = await res.text();
      return {_error: `API 오류 ${res.status}: ${errText.substring(0, 100)}`};
    }

    const result = await res.json();

    if (result.error) {
      return {_error: result.error.message || JSON.stringify(result.error)};
    }

    const parts = result.candidates?.[0]?.content?.parts || [];
    const text = parts.map(p => p.text || '').join('');

    if (!text) {
      return {_error: 'AI 응답이 비어있습니다'};
    }

    const first = text.indexOf('{');
    const last = text.lastIndexOf('}');
    if (first === -1 || last === -1) {
      return {_error: 'JSON을 찾을 수 없음: ' + text.substring(0, 100)};
    }

    return JSON.parse(text.substring(first, last + 1));
  } catch(e) {
    return {_error: e.message};
  }
}

async function registerAllProducts(total) {
  const status = document.getElementById('autoRegStatus');
  let registered = 0;

  for (let i = 0; i < total; i++) {
    const chk = document.getElementById('regChk' + i);
    if (!chk || !chk.checked) continue;

    const container = document.querySelectorAll('#autoRegResults .regName');
    const name = container[i]?.value?.trim();
    if (!name) continue;

    const color = document.querySelectorAll('#autoRegResults .regColor')[i]?.value?.trim() || '';
    const size = document.querySelectorAll('#autoRegResults .regSize')[i]?.value?.trim() || 'F';
    const price = document.querySelectorAll('#autoRegResults .regPrice')[i]?.value?.trim() || '0';
    const qty = document.querySelectorAll('#autoRegResults .regQty')[i]?.value?.trim() || '1';
    const supplier = document.querySelectorAll('#autoRegResults .regSupplier')[i]?.value?.trim() || '';

    const sellPrice = String(Math.round(parseInt(price) * 1.95 / 1000) * 1000);
    const barcode = '00' + Math.floor(100000 + Math.random() * 900000);
    const today = new Date().toISOString().substring(0, 19).replace('T', ' ');
    const specs = JSON.stringify([{barcode: barcode, size: size, color: color, note: '', qty: qty}]);

    try {
      await apiPost({
        action: 'addProduct',
        data: {
          BARCODE: barcode,
          DATE: today,
          NAME: name,
          VENDOR: supplier,
          BUY: price,
          SELL: sellPrice,
          STOCK: qty,
          USE: '☑',
          DELETE: '☐',
          SPECS: specs
        }
      });
      registered++;
      status.textContent = `등록 중... ${registered}/${total}`;
    } catch(e) {}
  }

  // 사입처 자동 등록
  const supplierInputs = document.querySelectorAll('#autoRegResults .regSupplier');
  const addedVendors = new Set();
  for (const input of supplierInputs) {
    const vName = input.value.trim();
    if (vName && !addedVendors.has(vName) && !vendors.find(v => v.NAME === vName)) {
      try {
        await apiPost({action: 'addVendor', data: {NAME: vName, PHONE:'', MOBILE:'', BUILDING:'', FLOOR:'', ROOM:'', NOTE:'', DELETE:'☐'}});
        addedVendors.add(vName);
      } catch(e) {}
    }
  }

  alert(`${registered}개 상품 등록 완료!`);
  closeModal('autoRegModal');
  loadAll();
}

  const total = records.reduce((s,r) => s + r.amount, 0);
  document.getElementById('purchaseTotalAmount').textContent = total.toLocaleString() + '원';

  if (records.length === 0) {
    document.getElementById('purchaseList').innerHTML = '<div class="empty"><div class="icon">🧾</div>사입 내역이 없습니다<div style="font-size:13px;margin-top:8px">영수증을 촬영해 추가하세요</div></div>';
    return;
  }

  document.getElementById('purchaseList').innerHTML = records.map(r => `
    <div class="list-item" onclick="showPurchaseDetail('${r.id}')">
      <div class="row">
        <div><div class="name">사입처 : ${r.supplier}</div><div class="sub">${r.date.substring(11,16)}</div></div>
        <div class="stock" style="color:#3B82F6">${r.amount.toLocaleString()}원</div>
      </div>
    </div>
  `).join('');
}

function showPurchaseDetail(id) {
  const all = JSON.parse(localStorage.getItem('purchases') || '[]');
  const r = all.find(x => x.id === id);
  if (!r) return;

  let photoHtml = '';
  if (r.photoData) {
    photoHtml = `<img src="${r.photoData}" style="width:100%;border-radius:8px;margin-bottom:12px">`;
  } else {
    photoHtml = '<div style="text-align:center;padding:30px;background:#f5f5f5;border-radius:8px;margin-bottom:12px;color:#999">📷 사진을 불러 올 수 없습니다.</div>';
  }

  document.getElementById('detailContent').innerHTML = `
    <div class="modal-title">${r.supplier}</div>
    ${photoHtml}
    <div class="detail-row"><span class="detail-label">사입금액</span><span class="detail-value" style="color:#3B82F6;font-weight:700">${r.amount.toLocaleString()}원</span></div>
    <div class="detail-row"><span class="detail-label">날짜</span><span class="detail-value">${r.date}</span></div>
    ${r.phone ? `<div class="detail-row"><span class="detail-label">매장전화</span><a href="tel:${r.phone}" class="phone-link">📞 ${r.phone}</a></div>` : ''}
    ${r.mobile ? `<div class="detail-row"><span class="detail-label">핸드폰</span><a href="tel:${r.mobile}" class="phone-link">📱 ${r.mobile}</a></div>` : ''}
    <button class="btn btn-gray" onclick="closeModal('detailModal')" style="margin-top:12px">닫기</button>
  `;
  openModal('detailModal');
}

  document.getElementById('purchaseDateText').textContent = `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;

}

async function processReceiptPhoto(input) {
  const file = input.files[0];
  if (!file) return;

  const apiKey = getGeminiKey();
  if (!apiKey) {
    alert('Gemini API 키를 설정해주세요.\n대시보드 ⚙️ 설정에서 입력하세요.');
    return;
  }

  document.getElementById('analyzeOverlay').style.display = 'flex';

  try {
    const base64 = await fileToBase64(file);
    const photoData = 'data:image/jpeg;base64,' + base64;

    const prompt = `이 도매 영수증 이미지를 분석해서 아래 JSON 형식으로만 응답하세요. 다른 설명 없이 JSON만 출력하세요.

{
  "supplier": "사입처명 (한글 또는 영문 그대로)",
  "amount": 판매소계금액숫자,
  "phone": "02로 시작하는 매장 전화번호 (하이픈 포함, 없으면 빈문자열)",
  "mobile": "010으로 시작하는 휴대폰 번호 (하이픈 포함, 없으면 빈문자열)"
}

규칙:
1. amount는 날짜(예: 26-03-24(화)) 바로 옆에 있는 금액을 추출할 것 (가장 중요!)
2. 영수증에 "26-03-24(화)  87,000  영수" 형식으로 날짜 옆에 총 사입금액이 표기됨
3. 반품소계, 합계, 외상잔액, 하단의 다른 숫자들은 절대 amount로 사용하지 말 것
4. amount는 콤마 없는 순수 숫자 (예: 87000)
5. supplier는 영수증 상단의 매장명 그대로
6. 02로 시작하는 번호는 phone, 010으로 시작하는 번호는 mobile`;

    const payload = {
      contents: [{parts: [
        {inlineData: {mimeType: 'image/jpeg', data: base64}},
        {text: prompt}
      ]}],
      generationConfig: {maxOutputTokens: 1024}
    };

    // gemini-2.0-flash 사용 (안정적)
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'API 오류');

    let allText = '';
    (data.candidates?.[0]?.content?.parts || []).forEach(p => { if(p.text) allText += p.text; });

    if (!allText) throw new Error('AI 응답이 비어있습니다');

    // JSON 블록 추출 (```json ... ``` 또는 { ... })
    let jsonStr = '';
    const codeBlockMatch = allText.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (codeBlockMatch) {
      jsonStr = codeBlockMatch[1].trim();
    } else {
      const fi = allText.indexOf('{');
      const li = allText.lastIndexOf('}');
      if (fi === -1 || li === -1) throw new Error('JSON을 찾을 수 없습니다');
      jsonStr = allText.substring(fi, li + 1);
    }

    const result = JSON.parse(jsonStr);

    const now = new Date();
    const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

    const record = {
      id: Date.now().toString(),
      date: dateStr,
      supplier: result.supplier || '알 수 없음',
      amount: result.amount || 0,
      phone: result.phone || '',
      mobile: result.mobile || '',
      photoData: photoData
    };

    const all = JSON.parse(localStorage.getItem('purchases') || '[]');
    all.unshift(record);
    localStorage.setItem('purchases', JSON.stringify(all));
    renderPurchaseList();

  } catch(e) {
    alert('영수증 분석 실패: ' + e.message);
  } finally {
    document.getElementById('analyzeOverlay').style.display = 'none';
    input.value = '';
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function executePrint() {
  const serverUrl = document.getElementById('printServerInput').value;
  localStorage.setItem('printerServerURL', serverUrl);
  if (!serverUrl) { alert('서버 주소를 입력하세요'); return; }

  const start = document.getElementById('printStart').value.replace('T',' ') + ':00';
  const end = document.getElementById('printEnd').value.replace('T',' ') + ':59';

  const filtered = products.filter(p => p.DATE >= start && p.DATE <= end);
  if (filtered.length === 0) { alert('해당 기간에 상품이 없습니다'); return; }

  const items = filtered.map(p => ({barcode:p.BARCODE,name:p.NAME,price:p.SELL,vendor:p.VENDOR}));
  const url = (serverUrl.startsWith('http') ? serverUrl : 'http://'+serverUrl) + '/api/print';

  try {
    await fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'print',items})});
    alert(filtered.length + '건 출력 요청 완료!');
    closeModal('detailModal');
  } catch(e) {
    alert('출력 실패: ' + e.message);
  }
}

let isListening = false;
let ttsReady = false;

function speak(text) {
  if (!('speechSynthesis' in window) || !ttsReady) {
    console.log('TTS:', text);
    return;
  }
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR';
    u.rate = 1.0;
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

// 아무 터치 시 TTS 활성화 (iOS 필수)
document.addEventListener('click', function unlockTTS() {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0.01;
    u.onend = () => { ttsReady = true; };
    window.speechSynthesis.speak(u);
  }
  document.removeEventListener('click', unlockTTS);
}, {once: true});

// ===== 음성 녹음 + Gemini 전사 =====
let mediaRecorder = null;
let audioChunks = [];
let recordingStream = null;

async function transcribeWithGemini(audioBlob) {
  const apiKey = getGeminiKey();
  if (!apiKey) return null;

  const base64 = await new Promise(resolve => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(audioBlob);
  });

  const productNames = products.slice(0, 100).map(p => p.NAME).join(', ');
  const vendorNames = vendors.slice(0, 30).map(v => v.NAME).join(', ');

  const prompt = `이 음성을 텍스트로 변환해줘. 의류 매장 재고관리 앱의 음성 명령이야.

등록된 상품명: ${productNames}
등록된 거래처: ${vendorNames}

가능한 명령: [상품명] [숫자]개 입고/출고, 상품, 거래처, 고객, 사입, 새로고침, 출력

발음이 비슷하면 등록된 상품명으로 교정하고, 단어 순서가 달라도 맞춰줘.
교정된 문장만 출력. 설명 없이.`;

  const mimeType = audioBlob.type || 'audio/mp4';

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      contents: [{
        parts: [
          {text: prompt},
          {inline_data: {mime_type: mimeType, data: base64}}
        ]
      }]
    })
  });
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || null;
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

function toggleVoice() {
  const btn = document.getElementById('micBtn');
  const feedback = document.getElementById('micFeedback');

  // 녹음 중이면 중지 → 분석
  if (isListening) {
    stopRecording();
    return;
  }

  // API 키 확인
  const apiKey = getGeminiKey();
  if (!apiKey) {
    alert('설정에서 Gemini API 키를 먼저 입력해주세요.');
    return;
  }

  // 마이크 권한 요청 + 녹음 시작
  feedback.style.display = 'block';
  feedback.textContent = '마이크 준비 중...';

  navigator.mediaDevices.getUserMedia({
    audio: {echoCancellation: true, noiseSuppression: true}
  }).then(stream => {
    recordingStream = stream;
    audioChunks = [];

    // 포맷 선택 (iOS: mp4, 나머지: webm)
    let options = {};
    if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
      options.mimeType = 'audio/webm;codecs=opus';
    } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
      options.mimeType = 'audio/mp4';
    }
    mediaRecorder = new MediaRecorder(stream, options);

    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstart = () => {
      isListening = true;
      btn.classList.add('listening');
      btn.textContent = '⏹';
      feedback.textContent = '🔴 듣고 있어요... 다시 누르면 완료';
      speak('말씀하세요');
    };

    mediaRecorder.onstop = async () => {
      isListening = false;
      btn.classList.remove('listening');
      btn.textContent = '🎤';

      // 마이크 스트림 해제
      if (recordingStream) {
        recordingStream.getTracks().forEach(t => t.stop());
        recordingStream = null;
      }
      mediaRecorder = null;

      if (audioChunks.length === 0) {
        feedback.textContent = '❌ 녹음된 소리가 없어요';
        speak('녹음된 소리가 없어요');
        setTimeout(() => { feedback.style.display = 'none'; }, 3000);
        return;
      }

      feedback.textContent = '🤖 AI가 분석 중...';
      try {
        const blob = new Blob(audioChunks, {type: options.mimeType || 'audio/mp4'});
        const result = await transcribeWithGemini(blob);

        if (result) {
          feedback.textContent = '✅ ' + result;
          speak(result);
          handleVoiceCommand(result);
        } else {
          feedback.textContent = '❌ 인식 실패. 다시 시도해주세요';
          speak('인식하지 못했어요');
        }
      } catch(e) {
        feedback.textContent = '❌ 오류: ' + e.message;
        speak('오류가 발생했어요');
      }
      setTimeout(() => { feedback.style.display = 'none'; }, 4000);
    };

    // 500ms마다 데이터 수집 (iOS 호환)
    mediaRecorder.start(500);

    // 15초 후 자동 종료
    setTimeout(() => { stopRecording(); }, 15000);

  }).catch(err => {
    isListening = false;
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    feedback.textContent = '❌ 마이크 권한이 필요해요. 설정에서 허용해주세요.';
    speak('마이크 권한이 필요해요');
    setTimeout(() => { feedback.style.display = 'none'; }, 4000);
  });
}

function handleVoiceCommand(cmd) {
  const feedback = document.getElementById('micFeedback');
  cmd = cmd.toLowerCase();

  function say(msg) { feedback.textContent = msg; speak(msg); }

  // 확인 모드
  if (cmd.includes('재차') && (cmd.includes('안물어') || cmd.includes('안 물어') || cmd.includes('안해도'))) {
    skipConfirmation = true; localStorage.setItem('skipConfirm','true');
    say('확인 없이 처리할게요'); return;
  }
  if ((cmd.includes('재차') || cmd.includes('다시')) && (cmd.includes('물어봐') || cmd.includes('확인'))) {
    skipConfirmation = false; localStorage.setItem('skipConfirm','false');
    say('확인 후 처리할게요'); return;
  }

  // 프린터 출력
  if (cmd.includes('출력') || cmd.includes('프린터') || cmd.includes('인쇄')) {
    openPrinter(); say('프린터 출력 열었어요'); return;
  }

  // 입고/출고
  const isIn = cmd.includes('입고');
  const isOut = cmd.includes('출고');
  if (isIn || isOut) {
    const action = isIn ? '입고' : '출고';
    const qtyMatch = cmd.match(/(\d+)\s*개/);
    if (!qtyMatch) { say('수량을 인식하지 못했어요'); return; }
    const qty = parseInt(qtyMatch[1]);

    let query = cmd.replace(/\d+\s*개/g,'').replace(/입고|출고|해줘|해 줘|하자|부탁|좀/g,'').trim();
    if (!query) { say('상품명을 인식하지 못했어요'); return; }

    const words = query.split(' ').filter(w=>w);
    // 1단계: 모든 단어 포함
    let matched = products.filter(p => words.every(w => p.NAME.toLowerCase().includes(w)));
    // 2단계: 단어 붙여서 매칭 (예: "단가라 후드" → "단가라후드")
    if (!matched.length) {
      const joined = words.join('');
      matched = products.filter(p => p.NAME.toLowerCase().includes(joined));
    }
    // 3단계: 일부 단어만 매칭 (2개 이상 일치하는 것 우선)
    if (!matched.length) {
      matched = products.map(p => ({p, score: words.filter(w => p.NAME.toLowerCase().includes(w)).length}))
        .filter(x => x.score >= Math.min(2, words.length))
        .sort((a,b) => b.score - a.score)
        .map(x => x.p);
    }
    // 4단계: 아무 단어나 하나라도 매칭
    if (!matched.length) matched = products.filter(p => words.some(w => p.NAME.toLowerCase().includes(w)));
    if (!matched.length) { say(`${query} 상품을 찾을 수 없어요`); return; }

    if (matched.length > 1) {
      const names = matched.slice(0,3).map(p => p.VENDOR+' '+p.NAME).join('\n');
      speak('여러 상품이 있어요. 거래처명을 선택해주세요');
      const choice = prompt('어떤 상품입니까?\n\n'+names+'\n\n거래처명을 입력하세요:');
      if (!choice) return;
      matched = matched.filter(p => p.VENDOR.includes(choice));
      if (!matched.length) { say('해당 거래처를 찾을 수 없어요'); return; }
    }

    const p = matched[0];
    const curStock = parseInt(p.STOCK)||0;
    const newStock = isIn ? curStock + qty : Math.max(0, curStock - qty);

    if (!skipConfirmation) {
      speak(`${p.NAME} ${qty}개 ${action}. 현재 ${curStock}개에서 ${newStock}개로 변경합니다`);
      if (!confirm(`${p.VENDOR} ${p.NAME}\n${qty}개 ${action} 맞습니까?\n\n${curStock}개 → ${newStock}개`)) return;
    }

    apiPost({action:'updateStock',barcode:p.BARCODE,newStock}).then(() => {
      say(`${p.NAME} ${qty}개 ${action} 완료했어요`);
      loadAll();
    });
    return;
  }

  // 탭 이동
  if (cmd.includes('상품') || cmd.includes('제품')) { switchTab('products'); say('상품 목록이에요'); }
  else if (cmd.includes('거래처') || cmd.includes('사입처')) { switchTab('vendors'); say('거래처 목록이에요'); }
  else if (cmd.includes('고객') || cmd.includes('손님')) { switchTab('customers'); say('고객 목록이에요'); }
  else if (cmd.includes('사입')) { switchTab('purchase'); say('사입용 화면이에요'); }
  else if (cmd.includes('새로고침') || cmd.includes('업데이트')) { loadAll(); say('새로고침 했어요'); }
  else if (cmd.includes('자동') || cmd.includes('영수증') || cmd.includes('스캔')) { switchTab('purchase'); say('사입용 화면이에요'); }
  else { say('잘 못 알아들었어요. 다시 말해주세요'); }
}

let geminiKeyIndex = 0;

function getGeminiKey() {
  const keys = JSON.parse(localStorage.getItem('geminiAPIKeys') || '[]').filter(k => k);
  if (!keys.length) return '';
  const key = keys[geminiKeyIndex % keys.length];
  geminiKeyIndex = (geminiKeyIndex + 1) % keys.length;
  return key;
}

function loadSettings() {
  const keys = JSON.parse(localStorage.getItem('geminiAPIKeys') || '[]');
  // 기존 단일 키 마이그레이션
  if (!keys.length) {
    const old = localStorage.getItem('geminiAPIKey');
    if (old) keys[0] = old;
  }
  document.querySelectorAll('.apiKeySlot').forEach((el, i) => el.value = keys[i] || '');
  document.getElementById('serverUrlInput').value = localStorage.getItem('printerServerURL') || '';
}

function saveSettings() {
  const keys = [];
  document.querySelectorAll('.apiKeySlot').forEach(el => keys.push(el.value.trim()));
  localStorage.setItem('geminiAPIKeys', JSON.stringify(keys));
  localStorage.setItem('printerServerURL', document.getElementById('serverUrlInput').value);
  closeModal('settingsModal');
  alert('저장되었습니다');
}
</script>
</body>
</html>
